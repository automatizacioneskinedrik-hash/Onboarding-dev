steps:
  # ─── BACKEND ────────────────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]   # empieza de inmediato
    args:
      - build
      - --cache-from=${_BACKEND_IMAGE}:latest   # reutiliza layer cache
      - --file=backend/Dockerfile
      - --tag=${_BACKEND_IMAGE}:${SHORT_SHA}
      - --tag=${_BACKEND_IMAGE}:latest
      - backend

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    waitFor: [build-backend]
    args: ["push", "--all-tags", "${_BACKEND_IMAGE}"]   # un solo push para ambos tags

  - id: deploy-backend-dev
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - backend-dev
      - --image=${_BACKEND_IMAGE}:${SHORT_SHA}
      - --region=europe-southwest1
      - --platform=managed
      - --quiet

  # ─── FRONTEND ───────────────────────────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]   # corre en paralelo con build-backend
    args:
      - build
      - --cache-from=${_FRONTEND_IMAGE}:latest   # reutiliza layer cache
      - --file=frontend/Dockerfile
      - --build-arg
      - VITE_API_URL=${_VITE_API_URL}
      - --tag=${_FRONTEND_IMAGE}:${SHORT_SHA}
      - --tag=${_FRONTEND_IMAGE}:latest
      - frontend

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    waitFor: [build-frontend]
    args: ["push", "--all-tags", "${_FRONTEND_IMAGE}"]   # un solo push para ambos tags

  - id: deploy-frontend-dev
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-frontend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - frontend-dev
      - --image=${_FRONTEND_IMAGE}:${SHORT_SHA}
      - --region=europe-southwest1
      - --platform=managed
      - --quiet

# ─── SUSTITUCIONES ────────────────────────────────────────────────────────────
# Nota: Cloud Build NO permite referenciar una sustitución dentro de otra
# (_BACKEND_IMAGE: ${_AR_REPO}/backend no funciona), así que se definen completas.
substitutions:
  _BACKEND_IMAGE: europe-southwest1-docker.pkg.dev/onboarding-dev-487716/repo-onboarding-dev/backend
  _FRONTEND_IMAGE: europe-southwest1-docker.pkg.dev/onboarding-dev-487716/repo-onboarding-dev/frontend
  _VITE_API_URL: https://backend-dev-866351374703.europe-southwest1.run.app

images:
  - ${_BACKEND_IMAGE}:${SHORT_SHA}
  - ${_BACKEND_IMAGE}:latest
  - ${_FRONTEND_IMAGE}:${SHORT_SHA}
  - ${_FRONTEND_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY